<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block titulo %}ZenuMarket{% endblock %}</title>
    <!-- Tailwind CSS desde CDN para estilos rápidos -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">

    <!-- Barra de navegación -->
    <nav class="bg-green-700 text-white px-6 py-4 flex justify-between items-center">
        <a href="{% url 'inicio' %}" class="text-xl font-bold">🌿 ZenuMarket</a>
        <div class="flex gap-4">
            {% if user.is_authenticated %}
                <a href="{% url 'perfil' %}" class="hover:underline">{{ user.first_name }}</a>
                <a href="{% url 'logout' %}" class="hover:underline">Salir</a>
            {% else %}
                <a href="{% url 'login' %}" class="hover:underline">Ingresar</a>
                <a href="{% url 'registro' %}" class="hover:underline">Registrarse</a>
            {% endif %}
        </div>
    </nav>

    <!-- Mensajes de éxito / error -->
    <div class="max-w-2xl mx-auto mt-4">
        {% for message in messages %}
            <div class="p-3 rounded mb-2
                {% if message.tags == 'success' %}bg-green-100 text-green-800
                {% elif message.tags == 'error' %}bg-red-100 text-red-800
                {% else %}bg-blue-100 text-blue-800{% endif %}">
                {{ message }}
            </div>
        {% endfor %}
    </div>

    <!-- Contenido de cada página -->
    <main class="max-w-2xl mx-auto mt-8 px-4">
        {% block contenido %}{% endblock %}
    </main>

</body>
</html>
