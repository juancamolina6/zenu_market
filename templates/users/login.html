{% extends "base.html" %}
{% block titulo %}Ingresar — ZenuMarket{% endblock %}

{% block contenido %}
<div class="bg-white p-8 rounded-xl shadow">
    <h1 class="text-2xl font-bold text-green-700 mb-6">Ingresar a ZenuMarket</h1>

    <form method="POST">
        {% csrf_token %}
        <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 mb-1">Usuario</label>
            <input type="text" name="username"
                class="w-full border rounded p-2 focus:outline-none focus:ring-2 focus:ring-green-500">
        </div>
        <div class="mb-6">
            <label class="block text-sm font-medium text-gray-700 mb-1">Contraseña</label>
            <input type="password" name="password"
                class="w-full border rounded p-2 focus:outline-none focus:ring-2 focus:ring-green-500">
        </div>
        <button type="submit"
            class="w-full bg-green-700 text-white py-2 rounded-lg hover:bg-green-800 font-medium">
            Ingresar
        </button>
    </form>

    <p class="text-center text-sm text-gray-500 mt-4">
        ¿No tienes cuenta? <a href="{% url 'registro' %}" class="text-green-700 hover:underline">Regístrate</a>
    </p>
</div>
{% endblock %}
